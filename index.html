<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contatos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F2EE;
      --card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --accent: #6B1B1B;
      --accent-light: #F9EEEE;
      --divider: #EBEBEB;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --radius: 20px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 380px; }

    .header { text-align: center; margin-bottom: 2rem; }

    .header-icon {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .header h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
    .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .phone-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .phone-item:active { background: var(--accent-light); }
    .phone-item + .phone-item { border-top: 1px solid var(--divider); }

    .icon-wrap {
      width: 44px;
      height: 44px;
      background: var(--accent-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease;
    }

    .phone-item:active .icon-wrap { background: var(--accent); }
    .phone-item:active .icon-wrap svg { stroke: white; }

    .icon-wrap svg { width: 20px; height: 20px; stroke: var(--accent); transition: stroke 0.15s ease; }

    .info { flex: 1; }
    .info-label { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-bottom: 2px; }
    .info-number { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.5px; }
    .info-number.large { font-size: 22px; }

    .arrow { color: var(--text-secondary); opacity: 0.4; flex-shrink: 0; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--text-secondary); opacity: 0.7; }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --card: #1E1E1E;
        --text-primary: #F0F0F0;
        --text-secondary: #888888;
        --accent: #A63030;
        --accent-light: #2A1515;
        --divider: #2A2A2A;
        --shadow: 0 2px 16px rgba(0,0,0,0.3);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <h1>Canais de Atendimento</h1>
      <p>Toque no número para ligar diretamente</p>
    </div>

    <div class="card">
      <a class="phone-item" href="tel:136">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="info">
          <div class="info-label">Atendimento</div>
          <div class="info-number large">136</div>
        </div>
        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>

      <a class="phone-item" href="tel:180">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="info">
          <div class="info-label">Atendimento</div>
          <div class="info-number large">180</div>
        </div>
        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>

      <a class="phone-item" href="tel:08007019656">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="info">
          <div class="info-label">Ouvidoria</div>
          <div class="info-number">0800-701-9656</div>
        </div>
        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>

    <div class="footer">Toque no número para ligar</div>
  </div>
</body>
</html>
